# policy.yaml — OpenShell sandbox policy
# Source: the live built-in default policy (`openshell policy get <sb> --full -o json`),
# extended with /claudeshared and the Claude auth/API egress passthrough allows.
#
# This file is passed to `openshell sandbox create --policy ./policy.yaml`.
# IMPORTANT: `--policy` OVERRIDES the built-in default policy entirely — it does NOT
# merge with an auto-baseline (verified live: `sandbox create --policy` help says
# "Overrides the built-in default"). Therefore this file must reproduce the full
# default policy (filesystem read_only/read_write baseline, landlock compatibility,
# and the process run-as user/group) and then add /claudeshared. Dropping the
# baseline (as an earlier minimal version did) strips the filesystem grants the
# OpenShell supervisor needs to set up its network namespace, causing the sandbox
# to fail provisioning with "Permission denied (os error 13)".
#
# Architecture B (hardened): two independently binary-scoped egress allowlists —
#   claude_egress: three Claude auth/API hosts, scoped to the claude executable
#   go_egress:     three Go-toolchain hosts, scoped to the Go binaries (Phase 4)
# No protocol field = opaque TCP/TLS passthrough (proxy never decrypts the stream;
# the OAuth token transits claude_egress only and the Go binaries cannot reach it).
# statsig.anthropic.com and sentry.io are intentionally absent —
# CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1 (set in Dockerfile) disables
# auto-updater, telemetry, Sentry error-reporting, and feedback so these hosts are
# never contacted. All other egress remains denied.
version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    # Blocker 1 fix (RUN-02/D-08): toolkit cloned to /opt/claude-engineering-toolkit (IMG-05);
    # Landlock must grant read for sandbox user to enumerate agents/ and skills/.
    # read_only only — write intentionally omitted (T-04-02 mitigation).
    - /opt
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /claudeshared   # Phase 2 addition (RUN-03/RUN-04): host bind mount, read-write
    - /home/sandbox   # runtime user home (Dockerfile `useradd -m ... sandbox`); claude
                      # persists ~/.claude/.credentials.json here. Without this grant,
                      # Landlock (default-deny) blocks the home dir: OAuth login appears
                      # to succeed in-memory but the token never persists ("not logged in").

landlock:
  compatibility: best_effort

process:
  run_as_group: sandbox
  run_as_user: sandbox

# Network egress policy — Architecture B (hardened; three-host Claude auth/API allowlist).
#
# Allows ONLY the three hosts the Claude Code binary requires for inference and subscription
# OAuth authentication:
#   - api.anthropic.com:443  — model inference (Claude API)
#   - platform.claude.com:443 — Console/Claude account authentication (OAuth)
#   - claude.ai:443           — claude.ai account authentication (OAuth)
#
# All three entries are opaque TLS passthroughs: omitting `protocol` is mandatory — it
# produces an opaque TCP/TLS passthrough stream (the proxy never terminates TLS or
# decrypts the subscription token). Using `protocol: rest` would terminate TLS and expose
# the token, and is explicitly NOT used here.
# Reference: docs/reference/policy-schema.mdx:158, docs/sandboxes/policies.mdx:59.
#
# `binaries:` scope: only /usr/bin/claude and /usr/local/bin/claude may open connections
# to these hosts. Claude Code (a Node.js script) is matched via the ancestor/declared-path
# logic in the OPA engine (opa.rs:42-53, test ancestor_binary_allowed at :1477-1500). Both
# candidate paths are listed for robustness (npm global bin on Fedora RPM nodejs is /usr/bin;
# /usr/local/bin/claude is also listed in case of a non-standard npm prefix).
#
# statsig.anthropic.com and sentry.io are intentionally omitted. CLAUDE_CODE_DISABLE_
# NONESSENTIAL_TRAFFIC=1 (Dockerfile ENV) disables the telemetry/auto-update/Sentry code
# paths so those hosts are never contacted. NET-05 verifies deny posture; reachability of
# the auth/API hosts is validated functionally by `./rebuild.sh login` (the claude binary).
network_policies:
  claude_egress:
    name: claude-egress
    endpoints:
      - host: api.anthropic.com
        port: 443
        # NO protocol field -> opaque TCP/TLS passthrough; proxy never decrypts the stream.
      - host: platform.claude.com
        port: 443
        # NO protocol field -> opaque TCP/TLS passthrough (Console/Claude account OAuth).
      - host: claude.ai
        port: 443
        # NO protocol field -> opaque TCP/TLS passthrough (claude.ai account OAuth).
    binaries:
      - { path: /usr/bin/claude }
      - { path: /usr/local/bin/claude }
  # ---------------------------------------------------------------------------
  # go_egress — Go-toolchain egress allow (Phase 4 / 04-03 audit enablement).
  # ---------------------------------------------------------------------------
  # Separate, independently binary-scoped policy so the Go toolchain can resolve
  # modules and the vulnerability DB WITHOUT widening the claude_egress scope:
  # the claude binary cannot reach these Go hosts, and the Go binaries cannot
  # reach the Claude auth/API hosts (the subscription OAuth token stays isolated).
  # Enables lint-reviewer (golangci-lint), test-reviewer (go test), and
  # vuln-reviewer (govulncheck) to run their tools in the network-isolated sandbox
  # against non-vendored Go projects under /claudeshared.
  #   - proxy.golang.org:443 — Go module proxy (go / golangci-lint / go test)
  #   - sum.golang.org:443   — Go checksum database (go verifies go.sum by default)
  #   - vuln.go.dev:443      — govulncheck vulnerability database
  # All opaque TLS passthrough (no protocol field): these are public endpoints,
  # no secrets transit them; the proxy never decrypts the stream.
  go_egress:
    name: go-egress
    endpoints:
      - host: proxy.golang.org
        port: 443
        # NO protocol field -> opaque TLS passthrough (Go module proxy).
      - host: sum.golang.org
        port: 443
        # NO protocol field -> opaque TLS passthrough (Go checksum database).
      - host: vuln.go.dev
        port: 443
        # NO protocol field -> opaque TLS passthrough (govulncheck vulnerability DB).
    binaries:
      - { path: /usr/bin/go }
      - { path: /usr/bin/golangci-lint }
      - { path: /usr/local/bin/govulncheck }
